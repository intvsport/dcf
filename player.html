<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Shaka Player Demo</title>

    <!-- Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.12.18/shaka-player.ui.min.js"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.12.18/controls.min.css"
        crossorigin="anonymous">

    <style>
        body {
            margin: 0;
            background-color: black;
        }

        div a img {
            visibility: hidden;
        }

        .shaka-seek-bar-container.shaka-seek-bar,
        .shaka-volume-bar-container.shaka-volume-bar {
            background: linear-gradient(to right,
                    #051937,
                    #00205b,
                    #00247e,
                    #22229f,
                    #510dbc);
        }

        .shaka-video-container.material-icons-round {
            color: #00abe2;
        }

        .shaka-spinner-path {
            stroke-dasharray: 1, 2000;
            stroke-dashoffset: 0;
            animation:
                dash 1.5s ease-in-out infinite,
                color 6s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes color {

            0%,
            100% {
                stroke: #d62d20;
            }

            40% {
                stroke: #0057e7;
            }

            66% {
                stroke: #008744;
            }

            80%,
            90% {
                stroke: #ffa700;
            }
        }
    </style>
</head>

<body>

    <div data-shaka-player-container
        style="position:absolute; z-index:-1; top:0; left:0; width:100%; height:100%; object-fit:cover;">

        <video autoplay data-shaka-player id="video" poster="" style="width:100%; height:100%;">
        </video>

    </div>

    <script>
        function getParameterByName(name) {
            name = name.replace(/[\[]/, "\[").replace(/[\]]/, "\]");
            var regex = new RegExp("[\?&]" + name + "=([^&#]*)"),
            results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
        }

        var get = getParameterByName('get');
        var key = getParameterByName('key');
        var key2 = getParameterByName('key2');
        var getIMG = getParameterByName('img');
        var getLang = getParameterByName('lang');

        const manifestUri =
            get || "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8";

        async function init() {
            const video = document.getElementById("video");
            const ui = video.ui;
            const controls = ui.getControls();
            const player = controls.getPlayer();

            window.player = player;
            window.ui = ui;

            player.configure({
                drm: {
                    clearKeys: {
                        [key || "220d8978f3fd45b696137c5b94f7a264"]:
                            key2 || "7bfe13500edee4f837ec03a907896306"
                    }
                },
                abr: {
                    defaultBandwidthEstimate: 16888,
                    enabled: true,
                    restrictions: {
                        minHeight: 359,
                        maxHeight: 720
                    }
                }
            });

            player.addEventListener("error", onPlayerErrorEvent);
            controls.addEventListener("error", onUIErrorEvent);

            try {
                await player.load(manifestUri);
                console.log("The video has now been loaded!");
            } catch (error) {
                onPlayerError(error);
            }
        }

        function onPlayerErrorEvent(event) {
            onPlayerError(event.detail);
        }

        function onPlayerError(error) {
            console.error("Error code", error.code, "object", error);
        }

        function onUIErrorEvent(event) {
            onPlayerError(event.detail);
        }

        function initFailed() {
            console.error("Unable to load the UI library!");
        }

        document.addEventListener("shaka-ui-loaded", init);
        document.addEventListener("shaka-ui-load-failed", initFailed);
    </script>

</body>

</html>
